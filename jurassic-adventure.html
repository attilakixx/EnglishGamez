<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jurassic kaland</title>
    <style>
      :root {
        --bg: #07110c;
        --panel: rgba(10, 18, 13, 0.88);
        --panel-solid: #101912;
        --ink: #fff8dc;
        --muted: #f8d889;
        --amber: #ffbf2f;
        --red: #d12f1f;
        --green: #2f7d3b;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      * { box-sizing: border-box; }

      html, body { min-height: 100%; }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 191, 47, 0.22), transparent 32rem),
          radial-gradient(circle at 85% 20%, rgba(209, 47, 31, 0.2), transparent 24rem),
          linear-gradient(145deg, #07110c 0%, #142118 42%, #0b120d 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, transparent 0 44%, rgba(255, 191, 47, 0.09) 44% 46%, transparent 46% 100%),
          repeating-linear-gradient(135deg, rgba(255, 191, 47, 0.06) 0 14px, rgba(209, 47, 31, 0.05) 14px 28px);
        mix-blend-mode: screen;
        opacity: 0.55;
      }

      .app {
        width: min(1180px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(14px, 2.5vw, 28px);
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-weight: 900;
        text-transform: uppercase;
        font-size: clamp(12px, 2.2vw, 15px);
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: #ffe28a;
        font-size: clamp(30px, 7vw, 64px);
        line-height: 0.92;
        letter-spacing: 0;
        text-shadow: 0 4px 0 #7a1f16, 0 12px 30px rgba(0, 0, 0, 0.65);
      }

      .nav-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .tool-button,
      .choice-button {
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font: inherit;
        font-weight: 900;
        color: #1d1207;
        background: linear-gradient(180deg, #ffe28a, var(--amber));
        box-shadow: 0 5px 0 #8a4a09, 0 14px 26px rgba(0, 0, 0, 0.28);
      }

      .tool-button {
        min-height: 48px;
        padding: 10px 14px;
        font-size: 15px;
      }

      .tool-button.secondary {
        color: var(--ink);
        background: rgba(255, 248, 220, 0.12);
        border: 2px solid rgba(255, 226, 138, 0.58);
        box-shadow: none;
      }

      .tool-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .scene {
        overflow: hidden;
        border-radius: 20px;
        border: 3px solid rgba(255, 226, 138, 0.58);
        background: #050907;
        box-shadow: var(--shadow);
      }

      .image-wrap {
        position: relative;
        min-height: clamp(240px, 50vw, 560px);
        background: #050907;
      }

      .image-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(7, 17, 12, 0) 35%, rgba(7, 17, 12, 0.95) 100%),
          radial-gradient(circle at 10% 20%, rgba(255, 191, 47, 0.2), transparent 18rem);
      }

      .scene img {
        width: 100%;
        height: clamp(240px, 50vw, 560px);
        display: block;
        object-fit: cover;
      }

      .status {
        position: absolute;
        left: clamp(12px, 2.5vw, 24px);
        right: clamp(12px, 2.5vw, 24px);
        bottom: clamp(12px, 2.5vw, 24px);
        z-index: 1;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        border-radius: 999px;
        padding: 6px 12px;
        color: #fff8dc;
        background: rgba(7, 17, 12, 0.74);
        border: 2px solid rgba(255, 226, 138, 0.45);
        font-size: 13px;
        font-weight: 900;
      }

      .story-panel {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 3vw, 28px);
        background:
          linear-gradient(90deg, rgba(209, 47, 31, 0.18), transparent 30%),
          var(--panel);
      }

      h2 {
        margin: 0;
        font-size: clamp(26px, 4.8vw, 46px);
        line-height: 1;
        color: #ffe28a;
        letter-spacing: 0;
      }

      .story-text {
        display: grid;
        gap: 10px;
        max-width: 78ch;
      }

      .story-text p {
        margin: 0;
        font-size: clamp(18px, 2.4vw, 23px);
        line-height: 1.45;
      }

      .choices {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }

      @media (min-width: 780px) {
        .choices.multi {
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }
      }

      .choice-button {
        width: 100%;
        min-height: 76px;
        padding: 16px 18px;
        text-align: left;
        font-size: clamp(19px, 2.6vw, 25px);
        line-height: 1.12;
        transition: transform 100ms ease, filter 120ms ease, box-shadow 100ms ease;
      }

      .choice-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.04);
        box-shadow: 0 8px 0 #8a4a09, 0 18px 30px rgba(0, 0, 0, 0.32);
      }

      .choice-button:active {
        transform: translateY(0);
        box-shadow: 0 5px 0 #8a4a09, 0 14px 26px rgba(0, 0, 0, 0.28);
      }

      .choice-button.danger {
        color: #fff8dc;
        background: linear-gradient(180deg, #e94d36, #9f2118);
        box-shadow: 0 5px 0 #4d100c, 0 14px 26px rgba(0, 0, 0, 0.28);
      }

      .choice-button.safe {
        color: #07110c;
        background: linear-gradient(180deg, #a7f3a0, #49b457);
        box-shadow: 0 5px 0 #23642f, 0 14px 26px rgba(0, 0, 0, 0.28);
      }

      .choice-button:focus-visible,
      .tool-button:focus-visible {
        outline: 4px solid #fff8dc;
        outline-offset: 3px;
      }

      @media (max-width: 560px) {
        .app { padding: 10px; }
        .topbar { align-items: stretch; }
        .nav-actions { width: 100%; justify-content: stretch; }
        .tool-button { flex: 1 1 130px; }
        .scene { border-radius: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <p>Dinoszaurusz-sziget</p>
          <h1>Jurassic kaland</h1>
        </div>
        <nav class="nav-actions" aria-label="Játék menü">
          <a class="tool-button secondary" href="index.html">Főmenü</a>
          <button class="tool-button secondary" type="button" id="backButton">Vissza</button>
          <button class="tool-button" type="button" id="restartButton">Újrakezdés</button>
        </nav>
      </header>

      <section class="scene" aria-live="polite">
        <div class="image-wrap">
          <img id="sceneImage" src="" alt="" />
          <div class="status">
            <span class="badge" id="statusBadge">Kaland folyamatban</span>
            <span class="badge" id="stepBadge">1. jelenet</span>
          </div>
        </div>
        <article class="story-panel">
          <h2 id="sceneTitle"></h2>
          <div class="story-text" id="storyText"></div>
          <div class="choices" id="choices"></div>
        </article>
      </section>
    </main>

      const state = {
        current: "gate",
        trail: [],
        steps: 1
      };

      const imageEl = document.getElementById("sceneImage");
      const titleEl = document.getElementById("sceneTitle");
      const textEl = document.getElementById("storyText");
      const choicesEl = document.getElementById("choices");
      const backButton = document.getElementById("backButton");
      const restartButton = document.getElementById("restartButton");
      const statusBadge = document.getElementById("statusBadge");
      const stepBadge = document.getElementById("stepBadge");

      function renderNode(id) {
        const node = GAME_NODES[id];
        if (!node) {
          throw new Error(`Hiányzó jelenet: ${id}`);
        }

        state.current = id;
        imageEl.src = IMAGE_DIR + node.image;
        imageEl.alt = node.titleHu;
        titleEl.textContent = node.titleHu;
        statusBadge.textContent = node.terminal === "win"
          ? "Sikeres menekülés"
          : node.terminal === "lose"
            ? "Vesztes vég"
            : node.badge || "Kaland folyamatban";
        stepBadge.textContent = `${state.steps}. jelenet`;

        textEl.replaceChildren(
          ...node.bodyHu.map((paragraph) => {
            const p = document.createElement("p");
            p.textContent = paragraph;
            return p;
          })
        );

        choicesEl.className = `choices ${node.choices.length > 1 ? "multi" : ""}`;
        choicesEl.replaceChildren(
          ...node.choices.map((choice) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `choice-button ${choice.tone || ""}`.trim();
            button.textContent = choice.labelHu;
            button.addEventListener("click", () => {
              if (choice.action === "restart") {
                restart();
                return;
              }
              state.trail.push(state.current);
              state.steps += 1;
              renderNode(choice.target);
              window.scrollTo({ top: 0, behavior: "smooth" });
            });
            return button;
          })
        );

        backButton.disabled = state.trail.length === 0;
      }

      function restart() {
        state.current = "gate";
        state.trail = [];
        state.steps = 1;
        renderNode("gate");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      backButton.addEventListener("click", () => {
        const previous = state.trail.pop();
        if (!previous) return;
        state.steps = Math.max(1, state.steps - 1);
        renderNode(previous);
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      restartButton.addEventListener("click", restart);
      renderNode("gate");
    </script>
