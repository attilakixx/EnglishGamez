<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NationalParksQuiz</title>
    <style>
      :root {
        --ink: #1f2937;
        --muted: #4b5563;
        --bg-a: #f0fdf4;
        --bg-b: #ecfeff;
        --card: #ffffff;
        --line: #cbd5e1;
        --good: #15803d;
        --bad: #b91c1c;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Nunito", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 550px at -10% -10%, #bbf7d0 0%, transparent 60%),
          radial-gradient(900px 550px at 110% 110%, #bae6fd 0%, transparent 60%),
          linear-gradient(120deg, var(--bg-a), var(--bg-b));
        padding: 20px;
      }

      .page {
        width: min(900px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 14px;
      }

      .back {
        justify-self: start;
        text-decoration: none;
        color: var(--ink);
        font-weight: 800;
        background: #ffffffcc;
        border: 3px solid #0891b2;
        border-radius: 999px;
        padding: 10px 16px;
      }

      .shell {
        background: var(--card);
        border: 3px solid #bae6fd;
        border-radius: 24px;
        box-shadow: 0 22px 40px rgba(30, 41, 59, 0.14);
        padding: clamp(16px, 3vw, 28px);
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 48px);
        line-height: 1.05;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: clamp(16px, 2.1vw, 20px);
      }

      .question-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .mode-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .mode-label {
        font-weight: 800;
        color: #0f172a;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 58px;
        height: 32px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #94a3b8;
        transition: 0.2s;
        border-radius: 999px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 24px;
        width: 24px;
        left: 4px;
        bottom: 4px;
        background-color: #ffffff;
        transition: 0.2s;
        border-radius: 999px;
      }

      .switch input:checked + .slider {
        background-color: #16a34a;
      }

      .switch input:checked + .slider:before {
        transform: translateX(26px);
      }

      .pill {
        background: #ecfeff;
        border: 2px solid #67e8f9;
        border-radius: 999px;
        padding: 6px 12px;
        font-weight: 800;
        font-size: 14px;
      }

      .next-btn {
        border: 3px solid #111827;
        background: #facc15;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
      }

      .logo-frame {
        min-height: 260px;
        border: 2px dashed var(--line);
        border-radius: 18px;
        background: #f8fafc;
        padding: 14px;
        display: grid;
        place-items: center;
      }

      .logo-frame img {
        width: min(100%, 560px);
        max-height: 360px;
        object-fit: contain;
        border-radius: 10px;
        background: #ffffff;
      }

      .text-prompt {
        display: none;
        font-weight: 800;
        font-size: clamp(22px, 4vw, 34px);
        text-align: center;
        color: #0f172a;
      }

      .options {
        display: grid;
        gap: 10px;
      }

      .option-btn {
        border: 3px solid #1e293b;
        background: #ffffff;
        color: #0f172a;
        border-radius: 14px;
        padding: 12px;
        text-align: left;
        font-weight: 800;
        font-size: clamp(17px, 2.4vw, 21px);
        cursor: pointer;
      }

      .option-btn.image-choice {
        padding: 8px;
        display: grid;
        place-items: center;
      }

      .option-btn.image-choice img {
        width: min(100%, 260px);
        height: 140px;
        object-fit: contain;
        border-radius: 8px;
        background: #ffffff;
      }

      .option-btn.correct {
        background: #dcfce7;
        border-color: var(--good);
        color: #14532d;
      }

      .option-btn.incorrect {
        background: #fee2e2;
        border-color: var(--bad);
        color: #7f1d1d;
      }

      .option-btn:disabled {
        opacity: 1;
        cursor: default;
      }

      .feedback {
        min-height: 28px;
        margin: 0;
        font-weight: 800;
      }

      .feedback.good { color: var(--good); }
      .feedback.bad { color: var(--bad); }
      .feedback.info { color: #1d4ed8; }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back" href="index.html" aria-label="Vissza a főoldalra">⬅ Vissza</a>

      <section class="shell" aria-live="polite">
        <header>
          <h1>NationalParksQuiz</h1>
          <p id="questionPrompt" class="subtitle">Melyik nemzeti park logója látható a képen?</p>
        </header>

        <div class="mode-row">
          <span class="mode-label">Térkép mód</span>
          <label class="switch" aria-label="Térkép mód kapcsoló">
            <input id="mapModeToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
          <div id="modeInfo" class="pill">Normál kérdések</div>
        </div>

        <div class="question-head">
          <div id="questionInfo" class="pill">Kérdés: 1</div>
          <div id="questionType" class="pill">Típus: Logó</div>
          <button id="nextQuestionBtn" class="next-btn" type="button">Új kérdés</button>
        </div>

        <div id="logoFrame" class="logo-frame">
          <img id="logoImage" alt="Nemzeti park logó" />
          <div id="textPrompt" class="text-prompt"></div>
        </div>

        <div id="options" class="options"></div>
        <p id="feedback" class="feedback info">Válassz egy lehetőséget.</p>
      </section>
    </main>

    <script>
      const parks = [
        { name: 'Hortobágyi Nemzeti Park', symbol: 'Daru', logos: ['national_parks/logos/hortobagyi.png'] },
        { name: 'Kiskunsági Nemzeti Park', symbol: 'Közönséges boróka', logos: ['national_parks/logos/kunsagi.png', 'national_parks/logos/kunsagi2.png'] },
        { name: 'Bükki Nemzeti Park', symbol: 'Szártalan bábakalács', logos: ['national_parks/logos/bukki.png'] },
        { name: 'Aggteleki Nemzeti Park', symbol: 'Foltos szalamandra', logos: ['national_parks/logos/aggteleki.png'] },
        { name: 'Fertő-Hanság Nemzeti Park', symbol: 'Nyárilúd', logos: ['national_parks/logos/fertő-hansagi.png'] },
        { name: 'Duna-Dráva Nemzeti Park', symbol: 'A két folyó', logos: ['national_parks/logos/duna drava.png'] },
        { name: 'Balaton-felvidéki Nemzeti Park', symbol: 'Lisztes kankalin, növény motívum', logos: ['national_parks/logos/balaton-felvideki.png', 'national_parks/logos/balaton-felvideki2.png'] },
        { name: 'Duna-Ipoly Nemzeti Park', symbol: 'Havasi cincér', logos: ['national_parks/logos/duna-ipoly.png'] },
        { name: 'Körös-Maros Nemzeti Park', symbol: 'Túzok', logos: ['national_parks/logos/koros-maros.png'] },
        { name: 'Őrségi Nemzeti Park', symbol: 'Siketfajd', logos: ['national_parks/logos/orsegi.png'] }
      ];

      const mapImagePath = 'national_parks/map/map only.png';
      const mapLetterKeys = [
        { letter: 'a', park: 'Fertő-Hansági Nemzeti Park' },
        { letter: 'b', park: 'Őrségi Nemzeti Park' },
        { letter: 'c', park: 'Balaton-felvidéki Nemzeti Park' },
        { letter: 'd', park: 'Duna-Ipoly Nemzeti Park' },
        { letter: 'e', park: 'Duna-Dráva Nemzeti Park' },
        { letter: 'f', park: 'Kiskunsági Nemzeti Park' },
        { letter: 'g', park: 'Bükki Nemzeti Park' },
        { letter: 'h', park: 'Aggteleki Nemzeti Park' },
        { letter: 'i', park: 'Hortobágyi Nemzeti Park' },
        { letter: 'j', park: 'Körös-Maros Nemzeti Park' }
      ];

      const elements = {
        mapModeToggle: document.getElementById('mapModeToggle'),
        modeInfo: document.getElementById('modeInfo'),
        questionInfo: document.getElementById('questionInfo'),
        questionType: document.getElementById('questionType'),
        questionPrompt: document.getElementById('questionPrompt'),
        nextQuestionBtn: document.getElementById('nextQuestionBtn'),
        logoImage: document.getElementById('logoImage'),
        textPrompt: document.getElementById('textPrompt'),
        options: document.getElementById('options'),
        feedback: document.getElementById('feedback')
      };

      const state = {
        questionIndex: 0,
        current: null,
        answered: false,
        mapMode: false
      };

      function encodePath(path) {
        return path
          .split('/')
          .map((part) => encodeURIComponent(part))
          .join('/');
      }

      function shuffle(input) {
        const arr = input.slice();
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function pickRandomLogo(park) {
        return park.logos[Math.floor(Math.random() * park.logos.length)];
      }

      function buildLogoQuestion() {
        const answerPark = parks[Math.floor(Math.random() * parks.length)];
        const otherParks = shuffle(parks.filter((park) => park.name !== answerPark.name)).slice(0, 2);
        const options = shuffle([answerPark.name, otherParks[0].name, otherParks[1].name]);

        return {
          type: 'logo',
          typeLabel: 'Típus: Logó → Park',
          prompt: 'Melyik nemzeti park logója látható a képen?',
          answer: answerPark.name,
          logoPath: pickRandomLogo(answerPark),
          options
        };
      }

      function buildSymbolQuestion() {
        const answerPark = parks[Math.floor(Math.random() * parks.length)];
        const distractorParks = shuffle(parks.filter((park) => park.name !== answerPark.name)).slice(0, 2);
        const options = shuffle([answerPark.symbol, distractorParks[0].symbol, distractorParks[1].symbol]);

        return {
          type: 'symbol',
          typeLabel: 'Típus: Park → Jelkép',
          prompt: `Mi a jelképe ennek a parknak?`,
          parkName: answerPark.name,
          answer: answerPark.symbol,
          options
        };
      }

      function buildLogoChoicesQuestion() {
        const answerPark = parks[Math.floor(Math.random() * parks.length)];
        const answerLogo = pickRandomLogo(answerPark);
        const distractorParks = shuffle(parks.filter((park) => park.name !== answerPark.name)).slice(0, 2);
        const distractorLogos = distractorParks.map((park) => pickRandomLogo(park));
        const options = shuffle([answerLogo, distractorLogos[0], distractorLogos[1]]);

        return {
          type: 'logoChoices',
          typeLabel: 'Típus: Park → Logó',
          prompt: 'Válaszd ki a park logóját a három kép közül!',
          parkName: answerPark.name,
          answer: answerLogo,
          answerLabel: `${answerPark.name} logója`,
          options
        };
      }

      function buildMapLetterQuestion() {
        const answer = mapLetterKeys[Math.floor(Math.random() * mapLetterKeys.length)];
        const distractors = shuffle(mapLetterKeys.filter((entry) => entry.park !== answer.park)).slice(0, 2);
        const options = shuffle([answer.park, distractors[0].park, distractors[1].park]);

        return {
          type: 'mapLetterToPark',
          typeLabel: 'Típus: Térkép betű → Park',
          prompt: `A térképen melyik nemzeti parkot jelöli a(z) "${answer.letter.toUpperCase()}" betű?`,
          letter: answer.letter,
          answer: answer.park,
          options
        };
      }

      function buildMapParkToLetterQuestion() {
        const answer = mapLetterKeys[Math.floor(Math.random() * mapLetterKeys.length)];
        const options = mapLetterKeys
          .map((entry) => entry.letter.toUpperCase())
          .sort((a, b) => a.localeCompare(b, 'hu', { sensitivity: 'base' }));

        return {
          type: 'mapParkToLetter',
          typeLabel: 'Típus: Térkép park → Betű',
          prompt: `A térképen melyik betű jelöli ezt a parkot?`,
          parkName: answer.park,
          answer: answer.letter.toUpperCase(),
          options
        };
      }

      function buildQuestion() {
        if (state.mapMode) {
          if (Math.random() < 0.5) return buildMapLetterQuestion();
          return buildMapParkToLetterQuestion();
        }

        const roll = Math.random();
        if (roll < 1 / 3) return buildLogoQuestion();
        if (roll < 2 / 3) return buildSymbolQuestion();
        return buildLogoChoicesQuestion();
      }

      function isImageOptionQuestion(question) {
        return question && question.type === 'logoChoices';
      }

      function optionDisplayValue(option, question) {
        if (isImageOptionQuestion(question)) return encodePath(option);
        return option;
      }

      function answerFeedbackLabel(question) {
        if (question.answerLabel) return question.answerLabel;
        return question.answer;
      }

      function renderOptionButton(option, question) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.dataset.option = optionDisplayValue(option, question);

        if (isImageOptionQuestion(question)) {
          btn.classList.add('image-choice');
          const img = document.createElement('img');
          img.src = encodePath(option);
          img.alt = 'Logó válaszlehetőség';
          btn.appendChild(img);
        } else {
          btn.textContent = option;
        }

        btn.addEventListener('click', () => onOptionClick(btn));
        return btn;
      }

      function setFeedback(text, kind) {
        elements.feedback.textContent = text;
        elements.feedback.className = `feedback ${kind}`;
      }

      function onOptionClick(button) {
        if (state.answered || !state.current) return;
        state.answered = true;

        const chosen = button.dataset.option;
        const correctAnswer = optionDisplayValue(state.current.answer, state.current);
        const buttons = Array.from(elements.options.querySelectorAll('.option-btn'));

        buttons.forEach((btn) => {
          btn.disabled = true;
          if (btn.dataset.option === correctAnswer) btn.classList.add('correct');
        });

        if (chosen === correctAnswer) {
          setFeedback('Helyes válasz!', 'good');
        } else {
          button.classList.add('incorrect');
          setFeedback(`Ez most nem talált. A helyes válasz: ${answerFeedbackLabel(state.current)}.`, 'bad');
        }
      }

      function renderQuestion() {
        if (parks.length < 3 || mapLetterKeys.length < 3) {
          setFeedback('Legalább 3 nemzeti park kell a játékhoz.', 'bad');
          elements.options.innerHTML = '';
          return;
        }

        state.questionIndex += 1;
        state.answered = false;
        state.current = buildQuestion();

        elements.questionInfo.textContent = `Kérdés: ${state.questionIndex}`;
        elements.questionType.textContent = state.current.typeLabel;
        elements.questionPrompt.textContent = state.current.prompt;
        elements.options.innerHTML = '';

        if (state.current.type === 'logo') {
          elements.logoImage.style.display = 'block';
          elements.logoImage.src = encodePath(state.current.logoPath);
          elements.logoImage.alt = 'Nemzeti park logó';
          elements.textPrompt.style.display = 'none';
          elements.textPrompt.textContent = '';
        } else if (state.current.type === 'mapLetterToPark') {
          elements.logoImage.style.display = 'block';
          elements.logoImage.src = encodePath(mapImagePath);
          elements.logoImage.alt = 'Magyarországi nemzeti parkok térképe';
          elements.textPrompt.style.display = 'block';
          elements.textPrompt.textContent = `Betű: ${state.current.letter.toUpperCase()}`;
        } else if (state.current.type === 'mapParkToLetter') {
          elements.logoImage.style.display = 'block';
          elements.logoImage.src = encodePath(mapImagePath);
          elements.logoImage.alt = 'Magyarországi nemzeti parkok térképe';
          elements.textPrompt.style.display = 'block';
          elements.textPrompt.textContent = state.current.parkName;
        } else {
          elements.logoImage.style.display = 'none';
          elements.logoImage.removeAttribute('src');
          elements.textPrompt.style.display = 'block';
          elements.textPrompt.textContent = state.current.parkName;
        }

        state.current.options.forEach((option) => {
          elements.options.appendChild(renderOptionButton(option, state.current));
        });

        setFeedback('Válassz egy lehetőséget.', 'info');
      }

      function onMapModeChange() {
        state.mapMode = elements.mapModeToggle.checked;
        elements.modeInfo.textContent = state.mapMode ? 'Térkép kérdések' : 'Normál kérdések';
        renderQuestion();
      }

      function init() {
        elements.nextQuestionBtn.addEventListener('click', renderQuestion);
        elements.mapModeToggle.addEventListener('change', onMapModeChange);
        renderQuestion();
      }

      init();
    </script>
  </body>
</html>
